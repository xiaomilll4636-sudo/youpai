services:
  # 后端 Node.js 服务
  - type: web
    name: youpai-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: youpai-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000

  # 前端 React 静态网站
  - type: web
    name: youpai-frontend
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: youpai-backend
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  # PostgreSQL 数据库
  - name: youpai-db
    databaseName: youpai_housekeeping
    user: youpai_user
    plan: free
